<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Internal JavaScript</title>
</head>
<body>
    <h2>Cách chèn Internal JavaScript</h2>
    <button id="btnInternal">Bấm vào đây</button>

    <script>
        // Lấy phần tử nút bấm bằng ID và gán sự kiện click
        document.getElementById("btnInternal").onclick = function() {
            alert("Thông báo từ Internal JavaScript!");
        };
    </script>
</body>
</html>
